# Paperasse - Config Netlify monorepo
# Remplace l'ancien .netlify/netlify.toml cassé et l'ancien netlify.toml
# Site: 0112f5df-60eb-4a03-b1d9-08b4b4168c22 (samaxan-compta-maquette)

[build]
  base    = "apps/web"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

[dev]
  command = "npm run dev"
  port    = 5173
